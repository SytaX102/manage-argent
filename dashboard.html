<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>AI Dropshipping Dashboard</h1>

<button onclick="logout()">Logout</button>

</header>

<section class="grid">

<div class="card">

<h2>Money Tracker</h2>

<input id="invest" type="number" placeholder="Investment">

<input id="profit" type="number" placeholder="Profit">

<button onclick="addMoney()">Add Entry</button>

<p>Total entries will appear in chart</p>

</div>

<div class="card">

<h2>Product Tracker</h2>

<input id="product" placeholder="Product name">

<input id="sales" type="number" placeholder="Sales">

<input id="ads" type="number" placeholder="Ad clicks">

<button onclick="addProduct()">Add Product</button>

<ul id="products"></ul>

</div>

<div class="card">

<h2>AI Profit Prediction</h2>

<input id="months" type="number" value="12">

<button onclick="predict()">Predict Future</button>

<p id="futureMoney"></p>

</div>

</section>

<div class="chart-card">

<h2>Money Growth</h2>

<canvas id="moneyChart"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
